baseURL = "https://nick1ee.github.io/"
languageCode = "zh-tw"
title = "Nick's Blog"
theme = "PaperMod"

[[menus.main]]
  name = "Posts"
  url = "/posts/"
  weight = 1

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 2

[[menus.main]]
  name = "Tags"
  url = "/tags/"
  weight = 3

[params]
  homeInfoParams = {Title = "Hi, I'm Nick 👋", Content = "Engineering Manager. Writing about tech, AI, and leadership."}
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  defaultTheme = "auto"
  comments = true

  [params.giscus]
    repo = "nick1ee/nick1ee.github.io"
    repoID = "R_kgDOR3vlLA"
    category = "Announcements"
    categoryID = "DIC_kwDOR3vlLM4C53L3"
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    theme = "preferred_color_scheme"
    lang = "en"

[taxonomies]
  tag = "tags"
  category = "categories"
